<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/jpeg"
        href="https://image2url.com/r2/default/images/1771323328076-73754ca7-5637-40c3-9e39-77832d8f5a18.jpeg">
    <title>Event Winners - Vortex Innovators</title>
    <meta name="description" content="Event Winners - Vortex Innovators">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.7">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .winners-section {
            padding-top: 120px;
            padding-bottom: 60px;
            min-height: 80vh;
            text-align: center;
        }

        .winners-container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        .event-title {
            color: var(--primary-red);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .winners-subtitle {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .podium-place {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 30px 20px;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .podium-place:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .podium-place i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .place-1 {
            order: 2;
            transform: scale(1.1) translateY(-20px);
            border-color: rgba(255, 215, 0, 0.5);
            background: linear-gradient(to top, rgba(255, 215, 0, 0.1), transparent);
        }

        .place-2 {
            order: 1;
            border-color: rgba(192, 192, 192, 0.5);
            background: linear-gradient(to top, rgba(192, 192, 192, 0.1), transparent);
        }

        .place-3 {
            order: 3;
            border-color: rgba(205, 127, 50, 0.5);
            background: linear-gradient(to top, rgba(205, 127, 50, 0.1), transparent);
        }

        .place-1:hover { transform: scale(1.1) translateY(-25px); }

        .place-1 i { color: #ffd700; text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .place-2 i { color: #c0c0c0; text-shadow: 0 0 20px rgba(192, 192, 192, 0.5); }
        .place-3 i { color: #cd7f32; text-shadow: 0 0 20px rgba(205, 127, 50, 0.5); }

        .winner-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 5px;
        }

        .winner-college {
            font-size: 0.9rem;
            color: #aaa;
        }

        .pending-msg {
            color: #888;
            font-size: 1.2rem;
            margin-top: 30px;
            line-height: 1.6;
            padding: 40px;
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 10px 25px;
            border: 1px solid var(--primary-red);
            color: #fff;
            text-decoration: none;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: var(--primary-red);
            box-shadow: 0 0 15px rgba(255,0,0,0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .podium { flex-direction: column; align-items: center; gap: 15px; }
            .place-1 { order: 1; transform: scale(1) translateY(0); margin-bottom: 10px; }
            .place-2 { order: 2; }
            .place-3 { order: 3; }
            .place-1:hover { transform: translateY(-5px); }
        }
    </style>
</head>

<body>

                <a href="/login.html" class="login-btn mobile-only">

        </div>

    <!-- System Status Bar -->

    <!-- Winners Section -->

            <p class="winners-subtitle">HALL OF FAME</p>

            <!-- Dynamic content goes here -->
            <div id="winners-content">
                <div class="pending-msg">
                    <i class="fas fa-hourglass-half" style="font-size: 2rem; margin-bottom: 15px; color: var(--primary-red);"></i>
                    <br>
                    Results for this event have not been published yet.<br>Please check back later!
                </div>
            </div>

            <a href="/elevate.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Events</a>
        </div>
    </section>

        <div class="contact-section">
            <h3>CONNECT WITH US</h3>

                <a href="mailto:vortexinnovators2k24@gmail.com" class="social-icon"><i class="fas fa-envelope"></i></a>

        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const eventParam = urlParams.get('event');
            
            if (eventParam) {
                document.getElementById('display-event-name').textContent = decodeURIComponent(eventParam) + ' WINNERS';
            }
