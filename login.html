<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up - Vortex Innovators</title>
    <meta name="description" content="Login or create your Vortex Innovators account.">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2.7">
    <link rel="stylesheet" href="style_slider.css?v=1.3">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        /* ── Base ── */
        body {
            margin: 0;
            overflow: hidden auto;
            background: radial-gradient(circle at center, #1a0000 0%, #050505 100%);
            scrollbar-width: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        /* ── Ambient background lines ── */
        .glow-line {
            position: fixed;
            background: linear-gradient(90deg, transparent, rgba(255, 26, 26, 0.8), transparent);
            height: 1px;
            width: 150%;
            left: -25%;
            transform: rotate(-35deg);
            opacity: 0.3;
            z-index: 1;
            pointer-events: none;
        }

        .glow-line.line1 {
            top: 20%;
            animation: drift 10s infinite linear;
        }

        .glow-line.line2 {
            top: 50%;
            opacity: 0.5;
            height: 2px;
            box-shadow: 0 0 20px #ff1a1a;
            animation: drift 15s infinite linear reverse;
        }

        .glow-line.line3 {
            top: 80%;
            animation: drift 12s infinite linear;
        }

        @keyframes drift {
            from {
                transform: rotate(-35deg) translateY(-50px);
            }

            to {
                transform: rotate(-35deg) translateY(50px);
            }
        }

        /* ── Main Container (The Wipe Area) ── */
        .auth-container {
            position: relative;
            width: 95vw;
            max-width: 1100px;
            min-height: 85vh;
            max-height: 750px;
            background: transparent;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            z-index: 10;
            display: flex;
            align-items: stretch;
            animation: containerEntrance 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            border: 1px solid rgba(255, 26, 26, 0.1);
        }

        @keyframes containerEntrance {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* ── Forms Background (Dark base layer) ── */
        .forms-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(10, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1;
        }

        .form-panel {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            z-index: 2;
            transition: opacity 0.4s ease-in-out, transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .form-panel.login {
            padding: 0 20px;
        }

        .form-panel.signup {
            padding: 0 20px;
            opacity: 0;
            pointer-events: none;
            transform: translateX(30px);
        }

        /* ── Overlay Curtain Layer (The bright sliding panel) ── */
        .overlay-layer {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            z-index: 5;
            overflow: hidden;
            /* Premium cubic bezier for the sliding wipe */
            transition: transform 0.9s cubic-bezier(0.77, 0, 0.175, 1);
            background: linear-gradient(135deg, rgba(160, 0, 0, 0.85) 0%, rgba(230, 20, 20, 0.9) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-left: 1px solid rgba(255, 100, 100, 0.2);
            box-shadow: -15px 0 50px rgba(255, 26, 26, 0.25);
            /* A gentler 8% diagonal cut */
            clip-path: polygon(8% 0, 100% 0, 100% 100%, 0% 100%);
        }

        /* The inner content of the overlay that counter-slides to stay centered */
        .overlay-inner {
            position: absolute;
            top: 0;
            left: -100%;
            /* Spans 200% width of the half-panel */
            width: 200%;
            height: 100%;
            display: flex;
            transition: transform 0.9s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .overlay-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 0 40px;
        }

        .overlay-panel h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 12px;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            animation: floatGlow 4s infinite alternate ease-in-out;
        }

        .overlay-panel p {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 10px;
            text-transform: uppercase;
        }

        @keyframes floatGlow {
            0% {
                filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.4));
                transform: translateY(0);
            }

            100% {
                filter: drop-shadow(0 15px 25px rgba(0, 0, 0, 0.6));
                transform: translateY(-8px);
            }
        }

        /* ── State: RIGHT PANEL ACTIVE (Signup mode) ── */
        .auth-container.right-panel-active .overlay-layer {
            transform: translateX(-100%);
            /* Flip the clip-path angle for the left side (100 - 8 = 92%) */
            clip-path: polygon(0 0, 92% 0, 100% 100%, 0% 100%);
            box-shadow: 10px 0 50px rgba(255, 26, 26, 0.3);
        }

        .auth-container.right-panel-active .overlay-inner {
            transform: translateX(50%);
        }

        .auth-container.right-panel-active .form-panel.login {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-30px);
        }

        .auth-container.right-panel-active .form-panel.signup {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(0);
        }

        /* ── Form Styles ── */
        .form-wrapper {
            max-width: 320px;
            width: 100%;
            margin: 0 auto;
        }

        .login-header h2 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, #ffffff, #ff4d4d);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3px;
        }

        .login-header p {
            font-family: 'Rajdhani', sans-serif;
            color: #999;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(100, 100, 100, 0.3);
            border-radius: 4px;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #ff1a1a;
            background: rgba(255, 26, 26, 0.05);
            box-shadow: 0 0 15px rgba(255, 26, 26, 0.2);
        }

        /* ── Clean White/Glass Button for the Form ── */
        .submit-btn {
            width: 100%;
            margin-top: 10px;
            background: transparent;
            border: 1px solid #ff1a1a;
            padding: 12px;
            color: #ff1a1a;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.9rem;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: #ff1a1a;
            transition: width 0.4s ease;
            z-index: -1;
        }

        .submit-btn:hover::before {
            width: 100%;
        }

        .submit-btn:hover {
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 26, 26, 0.5);
        }

        /* ── Switch buttons ── */
        .switch-page-row {
            margin-top: 25px;
            text-align: center;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.85rem;
            color: #ccc;
            position: relative;
            z-index: 10;
        }

        .switch-page-btn {
            background: transparent;
            border: none;
            color: #ff4d4d;
            padding: 0;
            cursor: pointer;
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            margin-left: 5px;
            transition: all 0.3s ease;
            text-decoration: underline;
            text-decoration-color: transparent;
        }

        .switch-page-btn:hover {
            color: #fff;
            text-decoration-color: #ff1a1a;
        }

        /* ── Divider ── */
        .or-divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
            color: #555;
            width: 100%;
        }

        .or-divider span {
            padding: 0 15px;
            font-size: 0.75rem;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 2px;
        }

        .or-divider::before,
        .or-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* ── Google button ── */
        .google-btn-custom {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            color: #eee;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .google-btn-custom:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .google-btn-custom img {
            width: 20px;
            height: 20px;
        }

        .auth-message {
            margin-top: 10px;
            font-size: 0.85rem;
            min-height: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: #ff4444;
            text-align: center;
        }

        /* ── Status bar ── */
        .status-bar {
            position: fixed;
            bottom: 20px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff1a1a;
            box-shadow: 0 0 10px #ff1a1a;
        }

        .status-text {
            color: #ff4d4d;
            font-family: monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        /* ── Nav ── */
        .glass-nav {
            position: fixed;
            top: 0;
            left: 0;
            transform: none;
            border-radius: 0;
            border: none;
            box-shadow: none;
            width: 100%;
            z-index: 1000;
            background: transparent;
            backdrop-filter: none;
        }

        /* ── Mobile Fallback (Stacking) ── */
        @media (max-width: 900px) {
            body {
                align-items: flex-start;
            }

            .auth-container {
                width: 100%;
                height: auto;
                max-height: none;
                border-radius: 0;
                border: none;
                box-shadow: none;
                overflow: visible;
                padding-top: 80px;
                /* nav clearance */
            }

            .overlay-layer {
                display: none;
            }

            /* Hide overlay on mobile */
            .forms-layer {
                position: relative;
                display: flex;
                flex-direction: column;
                background: transparent;
                backdrop-filter: none;
            }

            .form-panel {
                padding: 20px;
                width: 100%;
                box-sizing: border-box;
            }

            .form-panel.login,
            .form-panel.signup {
                padding: 20px !important;
                opacity: 1;
                pointer-events: auto;
                transform: none !important;
                display: flex;
            }

            /* Toggle display on mobile using JS class */
            .auth-container.right-panel-active .form-panel.login {
                display: none;
            }

            .auth-container.right-panel-active .form-panel.signup {
                display: flex;
                opacity: 1;
                transform: none;
            }

            .auth-container:not(.right-panel-active) .form-panel.signup {
                display: none;
            }

            .auth-container:not(.right-panel-active) .form-panel.login {
                display: flex;
            }

            .switch-page-row {
                display: block;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav class="glass-nav">
        <div class="nav-content">
            <div class="brand-container">
                <a href="/">
                    <img src="https://image2url.com/r2/default/images/1771323328076-73754ca7-5637-40c3-9e39-77832d8f5a18.jpeg"
                        alt="Vortex Logo" class="nav-logo-img">
                </a>
                <a href="/" class="logo" style="font-family: 'Cinzel', serif;">VORTEX</a>
            </div>
        </div>
    </nav>

    <!-- Ambient Lines -->
    <div class="glow-line line1"></div>
    <div class="glow-line line2"></div>
    <div class="glow-line line3"></div>

    <!-- Main Auth Container (Replaces Flip Card) -->
    <div class="auth-container" id="auth-container">

        <!-- Forms Layer (Static background, elements fade/slide in place) -->
        <div class="forms-layer">

            <!-- LOGIN FORM (Left Side) -->
            <div class="form-panel login">
                <div class="form-wrapper">
                    <div class="login-header">
                        <h2>SYSTEM ACCESS</h2>
                        <p>Authenticate with your identity provider</p>
                    </div>

                    <form id="std-login-form" class="auth-form">
                        <div class="form-group">
                            <input type="email" id="login-email" placeholder="Email Address" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="login-password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="submit-btn full-width">ACCESS SYSTEM</button>
                    </form>

                    <div id="login-auth-message" class="auth-message"></div>

                    <div class="or-divider"><span>OR</span></div>

                    <div id="g_id_onload"
                        data-client_id="239875271846-pamr47sh20r4ccm0lihdi1k73jgg6g6a.apps.googleusercontent.com"
                        data-callback="handleCredentialResponse" data-auto_prompt="false" data-context="signin"
                        data-ux_mode="popup" data-auto_select="true">
                    </div>
                    <div id="gsi-container-login" style="margin-bottom:10px;width:100%;">
                        <button id="custom-google-btn-login" type="button" class="google-btn-custom">
                            <img src="https://image2url.com/r2/default/images/1771475892216-8e96624f-122a-4124-b40f-69365e0e8667.png"
                                alt="Google Logo">
                            <span>Sign in with Google</span>
                        </button>
                    </div>

                    <div class="switch-page-row">
                        <span>Don't have an account?</span>
                        <button class="switch-page-btn" id="go-to-signup">Sign Up</button>
                    </div>
                </div>
            </div>

            <!-- SIGNUP FORM (Right Side) -->
            <div class="form-panel signup">
                <div class="form-wrapper">
                    <div class="login-header">
                        <h2>CREATE IDENTITY</h2>
                        <p>Register a new account to get started</p>
                    </div>

                    <form id="std-signup-form" class="auth-form">
                        <div class="form-group">
                            <input type="text" id="signup-name" placeholder="Full Name" required>
                        </div>
                        <div class="form-group">
                            <input type="email" id="signup-email" placeholder="Email Address" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="signup-password" placeholder="Password" required>
                        </div>
                        <button type="submit" class="submit-btn full-width">REGISTER ID</button>
                    </form>

                    <div id="signup-auth-message" class="auth-message"></div>

                    <div class="or-divider"><span>OR</span></div>

                    <div id="gsi-container-signup" style="margin-bottom:10px;width:100%;">
                        <button id="custom-google-btn-signup" type="button" class="google-btn-custom">
                            <img src="https://image2url.com/r2/default/images/1771475892216-8e96624f-122a-4124-b40f-69365e0e8667.png"
                                alt="Google Logo">
                            <span>Sign up with Google</span>
                        </button>
                    </div>

                    <div class="switch-page-row">
                        <span>Already have an account?</span>
                        <button class="switch-page-btn" id="go-to-login">Log In</button>
                    </div>
                </div>
            </div>

        </div> <!-- /forms-layer -->

        <!-- Overlay Curtain Layer (The red sliding part) -->
        <div class="overlay-layer">
            <div class="overlay-inner">

                <!-- Left Overlay Panel (Visible when overlay is on left/signup mode) -->
                <div class="overlay-panel overlay-left">
                    <h1>VORTEX</h1>
                    <p>Innovators 2k24</p>
                </div>

                <!-- Right Overlay Panel (Visible when overlay is on right/login mode) -->
                <div class="overlay-panel overlay-right">
                    <h1>WELCOME BACK</h1>
                    <p>Continue your innovation journey</p>
                </div>

            </div>
        </div>

    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-dot"></div>
        <span class="status-text">> SYSTEM_STATUS: ONLINE</span>
    </div>

    <script src="script.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        // ── Wipe/Sliding Logic ────────────────────────────────────────────
        const authContainer = document.getElementById('auth-container');

        function switchToSignup() {
            authContainer.classList.add('right-panel-active');
            history.replaceState(null, '', '?mode=signup');
        }
        function switchToLogin() {
            authContainer.classList.remove('right-panel-active');
            history.replaceState(null, '', '?mode=login');
        }

        // Form links
        document.getElementById('go-to-signup').addEventListener('click', switchToSignup);
        document.getElementById('go-to-login').addEventListener('click', switchToLogin);

        // Auto-slide if URL param says signup
        if (new URLSearchParams(window.location.search).get('mode') === 'signup') {
            // Disable transition for initial load so it snaps correctly
            const overlayLayer = document.querySelector('.overlay-layer');
            const overlayInner = document.querySelector('.overlay-inner');
            overlayLayer.style.transition = 'none';
            overlayInner.style.transition = 'none';

            authContainer.classList.add('right-panel-active');

            // Re-enable gently
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    overlayLayer.style.transition = '';
                    overlayInner.style.transition = '';
                });
            });
        }

        // ── Google Credential Handler ─────────────────────────────────────
        function handleCredentialResponse(response) {
            function decodeJwtResponse(token) {
                try {
                    var base64Url = token.split('.')[1];
                    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                    var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function (c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                    return JSON.parse(jsonPayload);
                } catch (e) { return {}; }
            }

            const responsePayload = decodeJwtResponse(response.credential);
            const googleUser = {
                name: responsePayload.name,
                email: responsePayload.email,
                picture: responsePayload.picture,
                provider: "google",
                id: responsePayload.sub,
                isPaid: false
            };
            const storedUsers = JSON.parse(localStorage.getItem('vortexUsers')) || [];
            const existingUser = storedUsers.find(u => u.email === googleUser.email);
            if (existingUser) googleUser.isPaid = existingUser.isPaid || false;
            else { storedUsers.push(googleUser); localStorage.setItem('vortexUsers', JSON.stringify(storedUsers)); }
            localStorage.setItem('vortexCurrentUser', JSON.stringify(googleUser));
            const redirectUrl = sessionStorage.getItem('loginRedirectUrl');
            if (redirectUrl) { sessionStorage.removeItem('loginRedirectUrl'); window.location.href = redirectUrl; }
            else { window.location.href = '/'; }
        }

        // ── Standard Auth Handlers ─────────────────────────────────────────
        document.getElementById('std-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const msg = document.getElementById('login-auth-message');
            msg.textContent = 'Authenticating...';
            msg.style.color = '#fff';
            try {
                const result = await loginUser(email, password);
                if (result.success) {
                    msg.textContent = 'Access Granted. Redirecting...';
                    msg.style.color = '#ff1a1a';
                    setTimeout(() => {
                        window.location.href = sessionStorage.getItem('loginRedirectUrl') || 'index.html';
                    }, 1000);
                } else {
                    msg.textContent = 'Error: ' + result.message;
                    msg.style.color = '#ff4444';
                }
            } catch (err) { msg.textContent = 'System Error: ' + err.message; msg.style.color = '#ff4444'; }
        });

        document.getElementById('std-signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const msg = document.getElementById('signup-auth-message');
            msg.textContent = 'Registering Identity...';
            msg.style.color = '#fff';
            try {
                const result = await registerUser(name, email, password);
                if (result.success) {
                    msg.textContent = 'Registration Successful. Logging you in...';
                    msg.style.color = '#ff1a1a';
                    try {
                        const loginResult = await loginUser(email, password);
                        if (loginResult.success) {
                            setTimeout(() => {
                                window.location.href = sessionStorage.getItem('loginRedirectUrl') || 'index.html';
                            }, 1000);
                        }
                    } catch (loginErr) {
                        msg.textContent = 'Registration Successful. Please sign in.';
                        setTimeout(() => switchToLogin(), 1500);
                    }
                } else {
                    msg.textContent = 'Error: ' + result.message;
                    msg.style.color = '#ff4444';
                }
            } catch (err) { msg.textContent = 'Network Error during Registration'; msg.style.color = '#ff4444'; }
        });

        // ── Google Button Logic ───────────────────────────────────────────
        window.addEventListener('load', () => {
            if (window.location.hash.includes('id_token=')) {
                const idToken = new URLSearchParams(window.location.hash.substring(1)).get('id_token');
                history.replaceState(null, null, ' ');
                handleCredentialResponse({ credential: idToken });
                return;
            }

            function setupGBtn(btnId) {
                const btn = document.getElementById(btnId);
                if (!btn) return;
                btn.addEventListener('click', () => {
                    const executeRedirect = () => {
                        const clientId = "239875271846-pamr47sh20r4ccm0lihdi1k73jgg6g6a.apps.googleusercontent.com";
                        const redirectUri = window.location.origin + window.location.pathname;
                        const url = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=id_token&scope=${encodeURIComponent("email profile openid")}&nonce=vortex_${Date.now()}`;
                        window.location.href = url;
                    };

                    if (typeof google !== 'undefined' && google.accounts) {
                        try {
                            google.accounts.id.prompt((notification) => {
                                if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                                    executeRedirect();
                                }
                            });
                        } catch (e) {
                            executeRedirect();
                        }
                    } else {
                        executeRedirect();
                    }
                });
            }
            setupGBtn('custom-google-btn-login');
            setupGBtn('custom-google-btn-signup');
        });
    </script>
